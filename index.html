<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tealk | Conexões Reais</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Cores calmas e menos saturadas */
            font-family: 'Lexend', sans-serif;
            background-color: #f8f9fa; 
            color: #2d3436;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            background: white;
            padding: 60px 40px;
            border-radius: 32px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .logo {
            color: #55efc4; /* Um verde menta suave */
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logo-dot {
            height: 12px;
            width: 12px;
            background-color: #fab1a0; /* Um tom pêssego para contraste */
            border-radius: 50%;
        }

        h1 {
            color: #2d3436;
            font-size: 32px;
            line-height: 1.2;
            margin-bottom: 15px;
        }

        .description {
            font-size: 18px;
            color: #636e72;
            margin-bottom: 40px;
            line-height: 1.6;
            font-weight: 300;
        }

        .form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input {
            padding: 18px;
            border-radius: 16px;
            border: 2px solid #eee;
            font-size: 16px;
            background: #fdfdfd;
            transition: 0.3s;
            outline: none;
        }

        input:focus {
            border-color: #55efc4;
        }

        button {
            padding: 18px;
            border-radius: 16px;
            border: none;
            background: #2d3436;
            color: white;
            font-weight: 500;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        button:hover {
            background: #000;
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 40px;
            font-size: 14px;
            color: #b2bec3;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Responsividade */
        @media (max-width: 480px) {
            .container {
                padding: 40px 20px;
            }
            h1 { font-size: 26px; }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">
            Tealk<span class="logo-dot"></span>
        </div>

        <h1>Um lugar onde a conversa flui no seu tempo.</h1>

        <p class="description">
            Criando uma rede social acolhedora para mentes neurodivergentes fortalecerem laços e habilidades de comunicação.
        </p>

        <div class="form">
            <input type="email" placeholder="Seu melhor e-mail...">
            <button>Quero saber quando lançar</button>
        </div>

        <div class="footer">
            Em construção com carinho 🌿
        </div>
    </div>
</body>
</html>
